[mcp_servers.mcp_hub_api_finder]
command = "npx"
args = ["-y", "mcp-hub", "stdio", "api-finder"]
env_vars = ["PUBLIC_DATA_API_KEY"]
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.mcp_hub_shortcuts]
command = "npx"
args = ["-y", "mcp-hub", "stdio", "shortcuts"]
env_vars = []
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.mcp_hub_mysql]
command = "npx"
args = ["-y", "mcp-hub", "stdio", "mysql"]
env_vars = ["MYSQL_URL"]
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.mcp_hub_postgres]
command = "npx"
args = ["-y", "mcp-hub", "stdio", "postgres"]
env_vars = ["POSTGRESQL_URL"]
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.mcp_hub_redis]
command = "npx"
args = ["-y", "mcp-hub", "stdio", "redis"]
env_vars = ["REDIS_URL"]
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.mcp_hub_docker]
command = "npx"
args = ["-y", "mcp-hub", "stdio", "docker"]
env_vars = ["DOCKER_ENABLE_WRITE_TOOLS", "DOCKER_ALLOWED_CONTAINERS", "DOCKER_ALLOWED_NETWORKS", "DOCKER_ALLOWED_VOLUMES", "DOCKER_COMPOSE_PROJECTS"]
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.mcp_hub_gitlab]
command = "npx"
args = ["-y", "mcp-hub", "stdio", "gitlab"]
env_vars = ["GITLAB_TOKEN", "GITLAB_URL", "GITLAB_ENABLE_WRITE_TOOLS"]
startup_timeout_sec = 20
tool_timeout_sec = 60
